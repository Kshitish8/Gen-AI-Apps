<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kai AI</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fb;
}
.chat-container{
    max-width: 800px;
    margin: 40px auto;
}
.chat-box{
    background:white;
    height:400px;
    overflow-y:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.user-msg{
    text-align:right;
    margin-bottom:10px;
}
.user-msg span{
    background:#0d6efd;
    color:white;
    padding:8px 12px;
    border-radius:15px;
    display:inline-block;
}
.bot-msg{
    text-align:left;
    margin-bottom:10px;
}
.bot-msg span{
    background:#e9ecef;
    padding:8px 12px;
    border-radius:15px;
    display:inline-block;
}
</style>
</head>

<body>

<div class="container chat-container">

    <h3 class="text-center mb-4">🤖 KAI AI</h3>

    <!-- Chat Area -->
    <div id="chatBox" class="chat-box mb-3">
        {% if prompt %}
        <div class="user-msg">
            <span>{{ prompt }}</span>
        </div> 
        {% endif %}
        {% if data %}
        <div class="bot-msg">
            <span>{{ data }}</span>
        </div>
        {% endif %}
    </div>

    <!-- Form -->
    <form id="chatForm" action="/gpt" method="post" class="input-group">
        <input type="text" id="prompt" name="userprompt" class="form-control" placeholder="Enter your prompt..." required>
        <button type="submit" class="btn btn-primary">Generate</button>
    </form>

</div>

<script>
// Let the form submit normally so the server (Kai.py) can generate and return the real AI response.
// If you prefer AJAX, we can replace this with a fetch POST and update the chat box without reload.
document.getElementById("chatForm").addEventListener("submit", function(e){
    // intentionally do not call e.preventDefault() — allow the browser to submit the form to /gpt
});

// On page load, ensure chat box scrolls to the latest message (if any)
window.addEventListener('load', function(){
    var chatBox = document.getElementById('chatBox');
    if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
});
</script>

</body>
</html>
